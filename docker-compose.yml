services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: teamflow-backend

    ports:
      - "5001:5001"

    env_file:
      - ./backend/.env

    volumes:
      - ./backend:/app
      - /app/node_modules

    depends_on:
      - mongodb

  mongodb:
    image: mongo:8

    container_name: teamflow-mongodb

    ports:
      - "27017:27017"

    volumes:
      - mongodb_data:/data/db

  mongo-express:
    image: mongo-express

    container_name: teamflow-mongo-express

    ports:
      - "8081:8081"

    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb

    depends_on:
      - mongodb

volumes:
  mongodb_data: